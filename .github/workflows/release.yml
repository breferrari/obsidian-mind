name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v3.8 or 3.8)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            if [[ ! "$VERSION" =~ ^v ]]; then
              VERSION="v$VERSION"
            fi
            # Normalize bare major (v4 → v4.0) or major.minor (v4.0 stays v4.0)
            if [[ "$VERSION" =~ ^v[0-9]+$ ]]; then
              VERSION="${VERSION}.0"
            fi
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected v*.* or v*.*.*)"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Pre-flight — tag must not already exist (manual trigger only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Guard only — the tag is created LATER, after the version bump is
          # committed, so the tagged tree carries its own version. Creating it
          # here (the old flow) tagged main HEAD before generate-changelog
          # bumped shard.yaml / vault-manifest.json, so every tagged tree
          # lagged one version behind its tag.
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Run tests
        run: node --experimental-strip-types --test '.claude/scripts/tests/'*.test.ts

      - name: Generate changelog
        run: |
          node --experimental-strip-types .github/scripts/generate-changelog.ts "$VERSION" > /tmp/changelog_section.md

      - name: Build release body
        run: |
          cat > /tmp/release_body.md <<'HEADER'
          ## Quick Start

          **Requirements:** [Obsidian](https://obsidian.md), [Node 22+ LTS](https://nodejs.org), and one of: [Claude Code](https://claude.ai/code) · [Codex CLI](https://github.com/openai/codex) · [Gemini CLI](https://github.com/google-gemini/gemini-cli)

          ```bash
          git clone https://github.com/breferrari/obsidian-mind.git
          cd obsidian-mind
          npm install -g @tobilu/qmd && qmd index && qmd embed   # optional: semantic search
          ```

          Open the folder as an Obsidian vault, then run `claude`, `codex`, or `gemini` in the directory and type `/om-standup` (or `om-standup` in Codex).

          Or download the vault zip below and extract it into your Obsidian vaults folder.

          **Already using obsidian-mind?** Just tell your agent: `Update this vault to the latest obsidian-mind from https://github.com/breferrari/obsidian-mind`

          HEADER
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' /tmp/release_body.md
          cat /tmp/changelog_section.md >> /tmp/release_body.md

      - name: Commit changelog and manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md vault-manifest.json
          # Match the script's ENOENT tolerance: forks without `.shardmind/`
          # have nothing to stage, and `git add` on a missing path would
          # fail the workflow.
          if [ -f .shardmind/shard.yaml ]; then
            git add .shardmind/shard.yaml
          fi
          git commit -m "release: update CHANGELOG and manifests for $VERSION"
          git push origin main

      - name: Tag the release commit
        run: |
          # Point the tag at the version-bump commit so the tagged tree carries
          # its own version (shard.yaml + vault-manifest.json). ShardMind reads
          # the manifest `version:` as the shard's identity and `shardmind
          # update` keys off it, so a tag whose tree lags its name mislabels
          # installs and can misdetect updates. -f / --force handles the
          # push:tags trigger, where a human-pushed tag already points at the
          # pre-bump commit; we move it forward to the bump commit. (Tag pushes
          # via GITHUB_TOKEN don't re-trigger this workflow.)
          git tag -f "$VERSION"
          git push origin "refs/tags/$VERSION" --force

      - name: Verify tagged tree version matches the tag
        run: |
          # Fail the release if the tagged tree's manifest version doesn't match
          # the tag — the regression guard for the skew this reordering fixes.
          want="${VERSION#v}"
          case "$want" in
            *.*.*) ;;            # already 3-component
            *.*)   want="${want}.0" ;;  # normalize 2-component tag (6.2 -> 6.2.0)
          esac
          shard=$(git show "$VERSION:.shardmind/shard.yaml" | sed -n 's/^version:[[:space:]]*//p' | head -1)
          manifest=$(git show "$VERSION:vault-manifest.json" | sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
          echo "tag=$VERSION expected=$want shard.yaml=$shard vault-manifest=$manifest"
          if [ "$shard" != "$want" ] || [ "$manifest" != "$want" ]; then
            echo "::error::Tagged tree version skew (shard.yaml=$shard manifest=$manifest, expected $want)"
            exit 1
          fi

      - name: Build vault zip
        run: |
          ZIP_NAME="obsidian-mind-${VERSION}.zip"

          zip -r "$ZIP_NAME" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".claude/scripts/tests/*" \
            -x ".claude/scripts/tsconfig.json" \
            -x ".claude/scripts/package.json" \
            -x ".claude/scripts/node_modules/*" \
            -x ".DS_Store" \
            -x "thinking/session-logs/*"

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create or update release
        run: |
          if gh release view "$VERSION" &>/dev/null; then
            gh release edit "$VERSION" --notes-file /tmp/release_body.md
            gh release upload "$VERSION" "$ZIP_NAME" --clobber
          else
            gh release create "$VERSION" "$ZIP_NAME" \
              --title "$VERSION" \
              --notes-file /tmp/release_body.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
