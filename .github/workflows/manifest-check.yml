name: Manifest Check

on:
  pull_request:
    paths:
      - '.claude/commands/**'
      - '.claude/agents/**'
      - '.claude/scripts/**'
      - 'templates/**'
      - 'bases/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check manifest coverage
        run: |
          MISSING=()

          # Check commands
          for f in .claude/commands/*.md; do
            [ -f "$f" ] || continue
            if ! grep -q "$f" vault-manifest.json; then
              MISSING+=("$f")
            fi
          done

          # Check agents
          for f in .claude/agents/*.md; do
            [ -f "$f" ] || continue
            if ! grep -q "$f" vault-manifest.json; then
              MISSING+=("$f")
            fi
          done

          # Check scripts
          for f in .claude/scripts/*.py .claude/scripts/*.sh; do
            [ -f "$f" ] || continue
            if ! grep -q "$f" vault-manifest.json; then
              MISSING+=("$f")
            fi
          done

          # Check templates
          for f in templates/*.md; do
            [ -f "$f" ] || continue
            if ! grep -q "$f" vault-manifest.json; then
              MISSING+=("$f")
            fi
          done

          # Check bases
          for f in bases/*.base; do
            [ -f "$f" ] || continue
            if ! grep -q "$f" vault-manifest.json; then
              MISSING+=("$f")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::The following files are not listed in vault-manifest.json infrastructure:"
            for f in "${MISSING[@]}"; do
              echo "  - $f"
            done
            echo ""
            echo "If these are template infrastructure files, add them to the 'infrastructure' array in vault-manifest.json."
            echo "Also consider adding a version_fingerprints entry if this is a new version-defining file."
          fi
