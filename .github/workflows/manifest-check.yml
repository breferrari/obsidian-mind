name: Manifest Check

on:
  pull_request:
    paths:
      - '.claude/commands/**'
      - '.claude/agents/**'
      - '.claude/scripts/**'
      - 'templates/**'
      - 'bases/**'
      - 'vault-manifest.json'
      - '.github/scripts/manifest-check.ts'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check manifest coverage
        run: node --experimental-strip-types .github/scripts/manifest-check.ts
