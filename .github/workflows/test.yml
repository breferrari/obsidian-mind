name: Tests

on:
  push:
    branches: [main]
    paths:
      - '.claude/scripts/**'
  pull_request:
    paths:
      - '.claude/scripts/**'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run hook tests
        run: python .claude/scripts/test_hooks.py -v
