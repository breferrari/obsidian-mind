name: Tests

on:
  push:
    branches: [main]
    paths:
      - '.claude/scripts/**'
  pull_request:
    paths:
      - '.claude/scripts/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run hook tests
        run: node --test .claude/scripts/test_hooks.js
