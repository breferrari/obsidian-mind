name: Tests

on:
  push:
    branches: [main]
    paths:
      - '.claude/scripts/**'
      - '.github/scripts/**'
      - '.github/fixtures/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - '.claude/scripts/**'
      - '.github/scripts/**'
      - '.github/fixtures/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install typecheck deps (CI-only, not shipped)
        shell: bash
        run: npm install --no-save --silent --prefix .claude/scripts typescript@5.6 @types/node@22
      - name: Typecheck
        shell: bash
        run: .claude/scripts/node_modules/.bin/tsc --noEmit -p .claude/scripts/tsconfig.json
      - name: Run hook tests
        shell: bash
        run: node --experimental-strip-types --test '.claude/scripts/tests/'*.test.ts

  parity:
    # Deletion gate: runs while the Python files still exist.
    # The delete-Python commit removes this job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Classify parity
        run: node --experimental-strip-types .github/scripts/parity-check.ts classify
      - name: Validate-write parity
        run: node --experimental-strip-types .github/scripts/parity-check.ts validate
      - name: Changelog parity (single-shot)
        run: node --experimental-strip-types .github/scripts/parity-check.ts changelog
